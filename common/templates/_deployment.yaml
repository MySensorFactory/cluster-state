{{- define "common.deployment" -}}
{{- range $name, $deployment := .Values.deployments }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "helm.labels" $ | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- with $.Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ $deployment.image }}
          ports:
            {{- range $deployment.ports }}
            - containerPort: {{ .port }}
              protocol: TCP
            {{- end }}
          {{- if $deployment.env }}
          env:
            {{- range $entry := $deployment.env }}
            - name: {{ $entry.name }}
              value: {{ $entry.value | quote }}
            {{- end }}
          {{- end }}
{{- end }}
{{- end }}
